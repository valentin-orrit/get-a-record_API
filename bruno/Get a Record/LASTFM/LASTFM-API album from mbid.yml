  url: "{{LASTFM_API_BASEURL}}/?method=album.getinfo&api_key={{LASTFM_API_KEY}}&mbid=02aa03a5-001b-4e5a-b3ad-23ad0fadb49c&format=json"
  params:
    - name: method
      value: album.getinfo
      type: query
    - name: api_key
