info:
  name: LASTFM-API artist infos from mbid
  type: http
  seq: 1

http:
  method: GET
  url: "{{LASTFM_API_BASEURL}}/?method=artist.getinfo&api_key={{LASTFM_API_KEY}}&artist=burial&format=json"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: method
      value: artist.getinfo
      type: query
    - name: api_key
      value: "{{LASTFM_API_KEY}}"
      type: query
    - name: artist
      value: burial
      type: query
    - name: format
      value: json
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
