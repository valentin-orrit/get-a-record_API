info:
  name: LASTFM-API tag get a random album
  type: http
  seq: 1

http:
  method: GET
  url: "{{LASTFM_API_BASEURL}}/?method=tag.gettopalbums&tag=2-step&api_key={{LASTFM_API_KEY}}&format=json&limit=1&page=10"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: method
      value: tag.gettopalbums
      type: query
    - name: tag
      value: 2-step
      type: query
    - name: api_key
      value: "{{LASTFM_API_KEY}}"
      type: query
    - name: format
      value: json
      type: query
    - name: limit
      value: "1"
      type: query
    - name: page
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
